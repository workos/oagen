openapi: "3.1.0"
info:
  title: Petstore
  version: "1.0.0"
  description: A sample API for pet management
servers:
  - url: https://api.petstore.io
paths:
  /pets:
    get:
      operationId: listPets
      summary: List all pets
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Pet"
    post:
      operationId: createPet
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePet"
      responses:
        "201":
          description: Created pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
  /pets/{pet_id}:
    get:
      operationId: getPet
      summary: Get a pet by ID
      parameters:
        - name: pet_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    put:
      operationId: updatePet
      summary: Update a pet
      parameters:
        - name: pet_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePet"
      responses:
        "200":
          description: Updated pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      operationId: deletePet
      summary: Delete a pet
      parameters:
        - name: pet_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /owners:
    get:
      operationId: listOwners
      summary: List all owners
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: A list of owners
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Owner"
components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
        - species
        - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        species:
          $ref: "#/components/schemas/Species"
        status:
          $ref: "#/components/schemas/PetStatus"
        owner_id:
          type:
            - string
            - "null"
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
    CreatePet:
      type: object
      required:
        - name
        - species
      properties:
        name:
          type: string
        species:
          $ref: "#/components/schemas/Species"
        owner_id:
          type: string
    UpdatePet:
      type: object
      properties:
        name:
          type: string
        status:
          $ref: "#/components/schemas/PetStatus"
    Owner:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
    Species:
      type: string
      enum:
        - dog
        - cat
        - bird
        - fish
    PetStatus:
      type: string
      enum:
        - available
        - adopted
        - pending
