openapi: '3.0.3'
info:
  title: Collision Test API
  version: '1.0.0'
servers:
  - url: https://api.example.com
paths:
  /things:
    get:
      operationId: Things.listThings
      summary: List things
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thing'
components:
  schemas:
    Thing:
      type: object
      properties:
        id:
          type: string
        detail:
          type: object
          properties:
            color:
              type: string
            size:
              type: integer
    Detail:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
